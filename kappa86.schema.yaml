# Rime schema settings
# encoding: utf-8

schema:
  schema_id: kappa86
  name: "河童中文86"
  version: "0.02"
  author:
    - "Mikata Riko"
  description: |
    河童子定制五筆字型86版
    編碼規則源自 王永民86版五筆輸入法
    禁用敲 z 鍵進入拼音反查功能
  dependencies:
    - pinyin_simp

switches:
  - name: ascii_mode
    reset: 0
    states: ["中文", "西文"]
  - name: full_shape
    states: ["半角", "全角"]
  - name: extended_charset
    states: ["常用", "增廣"]
  - name: ascii_punct
    states: ["。，", "．，"]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    #- reverse_lookup_translator    #禁用反查功能
    - table_translator
    - history_translator@historyz  #增加按z键重复上一次输入
    - echo_translator

speller:
  delimiter: " ;'"
  auto_select: true #是否自动上屏
  max_code_length: 4 #最大码长，结合auto_select就是最长4码，第5码上屏
  auto_select_unique_candidate: false #是否无重码自动上屏

translator:
  dictionary: kappa86
  enable_charset_filter: false #是否开启字符集过滤
  enable_encoder: false #是否开启自动造词
  enable_sentence: false #是否开启自动造句
  encode_commit_history: false #是否对已上屏词自动成词
  enable_completion: false #是否开启编码逐渐提示
  max_phrase_length: 4
  enable_user_dict: false #是否开启用户词典，rime默认会自动调频，如果要关闭自动调频则必须要关闭用户词典
  disable_user_dict_for_patterns:
    - "^z.*$"

reverse_lookup:
  dictionary: pinyin_simp
  prefix: "z"
  suffix: "'"
  tips: "〔拼音〕"
  preedit_format:
    - "xform/([nl])v/$1ü/"
    - "xform/([nl])ue/$1üe/"
    - "xform/([jqxy])v/$1u/"

punctuator:
  import_preset: default
  full_shape:
    #",": ["、", "，"]
    "|": ["・", "｜", "§", "¦"]
  half_shape:
    #",": ["、", "，"]
    "|": ["・", "·", "|", "｜", "§", "¦"]
    "!": ["！", "!", "‼", "⁉"]
    "?": ["？", "?", "⁇", "⁈"]

key_binder:
  bindings:
    # Emacs style
    - { when: composing, accept: Control+p, send: Up }
    - { when: composing, accept: Control+n, send: Down }
    - { when: composing, accept: Control+b, send: Left }
    - { when: composing, accept: Control+f, send: Right }
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }
    - { when: composing, accept: Control+d, send: Delete }
    - { when: composing, accept: Control+k, send: Shift+Delete }
    - { when: composing, accept: Control+h, send: BackSpace }
    - { when: composing, accept: Control+g, send: Escape }
    - { when: composing, accept: Control+bracketleft, send: Escape }
    - { when: composing, accept: Alt+v, send: Page_Up }
    - { when: composing, accept: Control+v, send: Page_Down }
    # paging keys
    - { when: composing, accept: ISO_Left_Tab, send: Page_Up }
    - { when: composing, accept: Shift+Tab, send: Page_Up }
    - { when: composing, accept: Tab, send: Page_Down }
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    #我禁用了句号和逗号的翻页功能
    #- { when: paging, accept: comma, send: Page_Up }
    #- { when: has_menu, accept: period, send: Page_Down }
    #我添加了分号与单引号选第2第3候选的功能
    - {accept: semicolon, send: 2, when: has_menu}
    - {accept: apostrophe, send: 3, when: has_menu}
    # hotkey switch
    - { when: always, accept: Control+Shift+1, select: .next }
    - { when: always, accept: Control+Shift+2, toggle: ascii_mode }
    - { when: always, accept: Control+Shift+3, toggle: full_shape }
    - { when: always, accept: Control+Shift+4, toggle: simplification }
    - { when: always, accept: Control+Shift+5, toggle: extended_charset }
    - { when: always, accept: Control+Shift+exclam, select: .next }
    - { when: always, accept: Control+Shift+at, toggle: ascii_mode }
    - { when: always, accept: Control+Shift+numbersign, toggle: full_shape }
    - { when: always, accept: Control+Shift+dollar, toggle: simplification }
    - { when: always, accept: Control+Shift+percent, toggle: extended_charset }
    - { when: always, accept: Shift+space, toggle: full_shape }
    - { when: always, accept: Control+period, toggle: ascii_punct }

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "^z[a-z]*'?$"

#配置重复上一次输入的功能
historyz:
  input: z
  size: 1  #重复前几次上屏，1就是一次
  initial_quality: 1  #如果z键有其他词库编码，那么将上一次上屏的词的权重设为1
#权重的数字越大，越靠前
#默认码表的权重为0，此处为1，
#所以重复上屏的字在默认码表前面。
#如果设为0或负数会有什么效果，暂时未尝试。


